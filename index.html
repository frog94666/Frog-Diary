<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蛙仔開箱趣</title>
    <style>
        :root {
            --bg-color: #f2f0eb; --card-bg: #ffffff; --accent: #7a6f66; 
            --text-dark: #4a4a4a; --text-light: #9e9e9e; --line-color: #e8e6e1;
            --pill-bg: #ebe8e2; --pill-text: #8c837a;
            --addon-bg: #fdf2f2; --addon-text: #e59a9a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-dark); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 480px; background-color: var(--card-bg); border-radius: 24px; padding: 20px 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); }
        header h1 { text-align: center; font-weight: 300; letter-spacing: 6px; font-size: 1.2rem; color: var(--accent); margin: 0 0 20px 0; }
        
        .summary-box { background-color: #faf9f7; border-radius: 16px; display: flex; margin-bottom: 20px; border: 1px solid var(--line-color); height: 80px; }
        .summary-item { flex: 1; border-right: 1px solid var(--line-color); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .summary-item:last-child { border-right: none; }
        .summary-item span { font-size: 0.65rem; color: var(--text-light); margin-bottom: 4px; }
        .summary-item b { font-size: 1.1rem; color: var(--accent); line-height: 1; }

        /* 核心對齊邏輯：使用固定寬度 + 右對齊 */
        .flex-row { display: flex; align-items: center; width: 100%; padding: 12px 0; border-bottom: 1px solid #fcfcfc; }
        
        .c-date { width: 45px; flex-shrink: 0; text-align: center; }
        .c-name { width: 60px; flex-shrink: 0; text-align: center; font-weight: 600; }
        .c-nat  { width: 40px; flex-shrink: 0; text-align: center; }
        .c-plan { flex: 1; text-align: center; }
        .c-add  { flex: 1; text-align: center; }
        .c-tip  { flex: 1; text-align: center; color: var(--text-light); }
        
        /* 解決對不齊的關鍵：強制固定寬度 85px 並靠右 */
        .c-amt { 
            width: 85px !important; 
            flex-shrink: 0; 
            text-align: right !important; 
            padding-right: 15px; /* 給予右邊一點留白，增加呼吸感 */
            font-weight: 700; 
            color: var(--accent);
            display: block;
        }

        .list-header { border-bottom: 1px solid var(--line-color); padding-bottom: 8px; margin-bottom: 4px; }
        .list-header span { font-size: 0.65rem; color: var(--text-light); font-weight: bold; }

        .year-header { 
            background: #faf9f7; border-radius: 10px; border: 1px solid var(--line-color); 
            margin: 8px 0; cursor: pointer; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .year-title { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
        .arrow { transition: transform 0.4s ease; font-size: 0.6rem; color: var(--text-light); }
        
        .content-container { 
            max-height: 5000px; 
            overflow: hidden; 
            transition: max-height 0.5s ease-in-out, opacity 0.3s;
            opacity: 1;
        }
        .collapsed { max-height: 0 !important; opacity: 0 !important; }
        .rotate-arrow { transform: rotate(-90deg); }

        .list-item { font-size: 0.72rem; }
        .pills { display: inline-block; font-size: 0.55rem; background-color: var(--pill-bg); color: var(--pill-text); padding: 2px 4px; border-radius: 4px; }
        .addon-pill { background-color: var(--addon-bg); color: var(--addon-text); font-weight: bold; }

        .footer { text-align: center; margin-top: 30px; padding: 10px; font-size: 0.6rem; color: var(--text-light); letter-spacing: 3px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>蛙 仔 開 箱 趣</h1></header>
    
    <div class="summary-box">
        <div class="summary-item"><span>人數</span><b>23</b></div>
        <div class="summary-item"><span>加值</span><b>2</b></div>
        <div class="summary-item"><span>總計</span><b>109,200</b></div>
    </div>

    <div class="flex-row list-header">
        <span class="c-date">日期</span>
        <span class="c-name">名字</span>
        <span class="c-nat">國籍</span>
        <span class="c-plan">方案</span>
        <span class="c-add">加值</span>
        <span class="c-tip">小費</span>
        <span class="c-amt">金額</span>
    </div>

    <div class="year-section">
        <div class="year-header" onclick="toggleYear('content2026', this)">
            <div class="year-title">2026 年度紀錄</div>
            <div class="arrow">▼</div>
        </div>
        <div id="content2026" class="content-container">
            <div class="flex-row list-item"><div class="c-date">05/03</div><div class="c-name">孟娜</div><div class="c-nat">越南</div><div class="c-plan">-</div><div class="c-add">-</div><div class="c-tip">-</div><div class="c-amt">10,500</div></div>
            <div class="flex-row list-item"><div class="c-date">05/01</div><div class="c-name">米露</div><div class="c-nat">台灣</div><div class="c-plan">-</div><div class="c-add"><span class="pills addon-pill">口爆</span></div><div class="c-tip">-</div><div class="c-amt">3,500</div></div>
            <div class="flex-row list-item"><div class="c-date">04/18</div><div class="c-name">孟娜</div><div class="c-nat">越南</div><div class="c-plan">-</div><div class="c-add">-</div><div class="c-tip">-</div><div class="c-amt">7,000</div></div>
            <div class="flex-row list-item"><div class="c-date">04/08</div><div class="c-name">小光</div><div class="c-nat">泰國</div><div class="c-plan">-</div><div class="c-add">-</div><div class="c-tip">-</div><div class="c-amt">2,500</div></div>
            <div class="flex-row list-item"><div class="c-date">03/22</div><div class="c-name">薇倩</div><div class="c-nat">泰國</div><div class="c-plan">-</div><div class="c-add">-</div><div class="c-tip">-</div><div class="c-amt">7,500</div></div>
            </div>
    </div>

    <div class="year-section">
        <div class="year-header" onclick="toggleYear('content2025', this)">
            <div class="year-title">2025 年度紀錄</div>
            <div class="arrow">▼</div>
        </div>
        <div id="content2025" class="content-container">
            <div class="flex-row list-item"><div class="c-date">12/31</div><div class="c-name">奈香</div><div class="c-nat">泰國</div><div class="c-plan">-</div><div class="c-add">-</div><div class="c-tip">-</div><div class="c-amt">5,600</div></div>
            <div class="flex-row list-item"><div class="c-date">12/05</div><div class="c-name">陽光</div><div class="c-nat">泰國</div><div class="c-plan">-</div><div class="c-add"><span class="pills addon-pill">2S</span></div><div class="c-tip">-</div><div class="c-amt">3,500</div></div>
        </div>
    </div>

    <div class="footer">W A Z A I - D I A R Y</div>
</div>

<script>
    function toggleYear(contentId, headerElement) {
        const content = document.getElementById(contentId);
        const arrow = headerElement.querySelector('.arrow');
        content.classList.toggle('collapsed');
        arrow.classList.toggle('rotate-arrow');
    }
</script>

</body>
</html>
