<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-color: #f2f0eb; --card-bg: #ffffff; --accent: #7a6f66; 
            --text-dark: #4a4a4a; --text-light: #9e9e9e; --line-color: #e8e6e1;
            --pill-bg: #ebe8e2; --pill-text: #8c837a;
            --addon-bg: #fdf2f2; --addon-text: #e59a9a;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-dark); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background-color: var(--card-bg); border-radius: 24px; padding: 20px 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); }
        header h1 { text-align: center; font-weight: 300; letter-spacing: 6px; font-size: 1.2rem; color: var(--accent); margin: 0 0 20px 0; }
        
        .summary-box { background-color: #faf9f7; border-radius: 16px; display: flex; margin-bottom: 20px; border: 1px solid var(--line-color); height: 80px; }
        .summary-item { flex: 1; border-right: 1px solid var(--line-color); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .summary-item:last-child { border-right: none; }
        .summary-item span { font-size: 0.65rem; color: var(--text-light); margin-bottom: 4px; }
        .summary-item b { font-size: 1.1rem; color: var(--accent); }

        /* 核心對齊桌格：確保標題與內容絕對同步 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 5px; }
        
        /* 日期、名字、國籍、方案、加值、小費 全部設定為 13.5% (等寬) */
        .col-fixed { width: 13.5%; text-align: center; }
        /* 金額留剩餘空間 */
        .col-amt { width: 19%; text-align: right; }

        th { font-size: 0.65rem; color: var(--text-light); font-weight: bold; padding: 12px 0; border-bottom: 1px solid var(--line-color); }
        td { padding: 14px 0; font-size: 0.75rem; border-bottom: 1px solid #fcfcfc; white-space: nowrap; vertical-align: middle; }
        
        /* 針對特定列的微調 */
        .text-left { text-align: left; }
        .text-right { text-align: right; }

        .year-header { 
            background: #faf9f7; border-radius: 10px; border: 1px solid var(--line-color); 
            margin: 15px 0 5px 0; cursor: pointer; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .year-title { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
        .arrow { transition: transform 0.3s ease; font-size: 0.6rem; color: var(--text-light); }
        .content-container { max-height: 5000px; overflow: hidden; transition: max-height 0.4s ease; }
        .collapsed { max-height: 0 !important; }
        .rotate-arrow { transform: rotate(-90deg); }

        .pills { display: inline-block; font-size: 0.55rem; background-color: var(--pill-bg); color: var(--pill-text); padding: 2px 4px; border-radius: 4px; }
        .addon-pill { background-color: var(--addon-bg); color: var(--addon-text); font-weight: bold; }
        .footer { text-align: center; margin-top: 30px; padding: 10px; font-size: 0.6rem; color: var(--text-light); letter-spacing: 3px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>蛙 仔 開 箱 趣</h1></header>
    
    <div class="summary-box">
        <div class="summary-item"><span>人數</span><b>23</b></div>
        <div class="summary-item"><span>加值</span><b>2</b></div>
        <div class="summary-item"><span>總計</span><b>109,200</b></div>
    </div>

    <div class="year-section">
        <div class="year-header" onclick="toggleYear('c2026', this)">
            <div class="year-title">2026 年度紀錄</div><div class="arrow">▼</div>
        </div>
        <div id="c2026" class="content-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-fixed text-left">日期</th>
                        <th class="col-fixed">名字</th>
                        <th class="col-fixed">國籍</th>
                        <th class="col-fixed">方案</th>
                        <th class="col-fixed">加值</th>
                        <th class="col-fixed">小費</th>
                        <th class="col-amt">金額</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="col-fixed text-left" style="color: var(--text-light);">05/03</td>
                        <td class="col-fixed" style="font-weight:600;">孟娜</td>
                        <td class="col-fixed">越南</td>
                        <td class="col-fixed">-</td>
                        <td class="col-fixed">-</td>
                        <td class="col-fixed">-</td>
                        <td class="col-amt" style="font-weight:700; color:var(--accent);">10,500</td>
                    </tr>
                    <tr>
                        <td class="col-fixed text-left" style="color: var(--text-light);">05/01</td>
                        <td class="col-fixed" style="font-weight:600;">米露</td>
                        <td class="col-fixed">台灣</td>
                        <td class="col-fixed">-</td>
                        <td class="col-fixed"><span class="pills addon-pill">口爆</span></td>
                        <td class="col-fixed">-</td>
                        <td class="col-amt" style="font-weight:700; color:var(--accent);">3,500</td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>

    <div class="footer">W A Z A I - D I A R Y</div>
</div>

<script>
    function toggleYear(id, el) {
        const c = document.getElementById(id);
        const a = el.querySelector('.arrow');
        c.classList.toggle('collapsed');
        a.classList.toggle('rotate-arrow');
    }
</script>

</body>
</html>
