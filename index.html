<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>蛙仔開箱趣</title>

<style>

:root{
    --bg-color:#f2f0eb;
    --card-bg:#ffffff;
    --accent:#7a6f66;
    --text-dark:#4a4a4a;
    --text-light:#9e9e9e;
    --line-color:#e8e6e1;

    --pill-bg:#ebe8e2;
    --pill-text:#8c837a;

    --addon-bg:#fdf2f2;
    --addon-text:#e59a9a;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    margin:0;
    padding:0;
}

body{

    background:var(--bg-color);

    color:var(--text-dark);

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;

    display:flex;
    justify-content:center;

    padding:10px;
}

/* 主容器 */

.container{

    width:100%;
    max-width:480px;

    background:var(--card-bg);

    border-radius:24px;

    padding:20px 10px;

    box-shadow:
        0 8px 30px rgba(0,0,0,0.03);

    overflow:hidden;
}

/* Header */

header h1{

    text-align:center;

    font-weight:300;

    letter-spacing:6px;

    font-size:1.2rem;

    color:var(--accent);

    margin:0 0 20px 0;
}

/* Summary */

.summary-box{

    background:#faf9f7;

    border-radius:16px;

    display:flex;

    margin-bottom:20px;

    border:1px solid var(--line-color);

    height:80px;

    overflow:hidden;
}

.summary-item{

    flex:1;

    border-right:1px solid var(--line-color);

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;
}

.summary-item:last-child{
    border-right:none;
}

.summary-item span{

    font-size:0.65rem;

    color:var(--text-light);

    margin-bottom:4px;
}

.summary-item b{

    font-size:1.1rem;

    color:var(--accent);

    line-height:1;

    white-space:nowrap;
}

/* 表格 */

.table-wrapper{
    width:100%;
}

/* Row */

.flex-row{

    display:flex;

    align-items:center;

    width:100%;

    text-align:center;

    padding:12px 0;

    min-width:0;
}

/* 固定欄位 */

.c-date{
    width:48px;
    flex-shrink:0;
}

.c-name{
    width:58px;
    flex-shrink:0;
    font-weight:600;
}

.c-nat{
    width:42px;
    flex-shrink:0;
}

/* 中間彈性欄位 */

.c-plan,
.c-add,
.c-tip{

    flex:1;

    min-width:0;
}

/* 金額 */

.c-amt{

    width:72px;

    flex-shrink:0;

    text-align:right !important;

    padding-right:8px;

    font-weight:700;

    color:var(--accent);

    white-space:nowrap;
}

/* Header */

.list-header{

    border-bottom:1px solid var(--line-color);

    padding-bottom:8px;

    margin-bottom:4px;
}

.list-header span{

    font-size:0.65rem;

    color:var(--text-light);

    font-weight:bold;

    white-space:nowrap;
}

/* 年度區塊 */

.year-section{
    margin-bottom:10px;
}

.year-header{

    background:#faf9f7;

    border-radius:10px;

    border:1px solid var(--line-color);

    margin:8px 0;

    padding:12px 15px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    cursor:pointer;

    user-select:none;
}

.year-title{

    font-size:0.85rem;

    font-weight:600;

    color:var(--accent);
}

.arrow{

    font-size:0.6rem;

    color:var(--text-light);

    transition:transform .35s ease;
}

.rotate-arrow{
    transform:rotate(-90deg);
}

/* 動畫 */

.content-container{

    overflow:hidden;

    max-height:5000px;

    opacity:1;

    transition:
        max-height .45s ease,
        opacity .3s ease;
}

.content-container.collapsed{

    max-height:0 !important;

    opacity:0;
}

/* Item */

.list-item{

    border-bottom:1px solid #fcfcfc;

    font-size:0.72rem;
}

/* Pills */

.pills{

    display:inline-block;

    font-size:0.55rem;

    background:var(--pill-bg);

    color:var(--pill-text);

    padding:2px 4px;

    border-radius:4px;

    white-space:nowrap;
}

.addon-pill{

    background:var(--addon-bg);

    color:var(--addon-text);

    font-weight:bold;
}

/* Footer */

.footer{

    text-align:center;

    margin-top:30px;

    padding:10px;

    font-size:0.6rem;

    color:var(--text-light);

    letter-spacing:3px;

    opacity:.5;
}

/* 小手機 */

@media (max-width:480px){

    .container{
        border-radius:18px;
    }

    .summary-item b{
        font-size:1rem;
    }

    .list-item{
        font-size:0.68rem;
    }

    .c-name{
        width:54px;
    }

    .c-amt{
        width:66px;
    }
}

</style>
</head>

<body>

<div class="container">

<header>
    <h1>蛙 仔 開 箱 趣</h1>
</header>

<!-- Summary -->

<div class="summary-box">

    <div class="summary-item">
        <span>人數</span>
        <b>23</b>
    </div>

    <div class="summary-item">
        <span>加值</span>
        <b>2</b>
    </div>

    <div class="summary-item">
        <span>總計</span>
        <b>109,200</b>
    </div>

</div>

<!-- Table -->

<div class="table-wrapper">

<div class="flex-row list-header">

    <span class="c-date">日期</span>
    <span class="c-name">名字</span>
    <span class="c-nat">國籍</span>
    <span class="c-plan">方案</span>
    <span class="c-add">加值</span>
    <span class="c-tip">小費</span>
    <span class="c-amt">金額</span>

</div>

<!-- 2026 -->

<div class="year-section">

<div class="year-header">

    <div class="year-title">
        2026 年度紀錄
    </div>

    <div class="arrow">▼</div>

</div>

<div id="content2026" class="content-container">

<div class="flex-row list-item">

    <div class="c-date">05/03</div>
    <div class="c-name">孟娜</div>
    <div class="c-nat">越南</div>
    <div class="c-plan">-</div>
    <div class="c-add">-</div>
    <div class="c-tip">-</div>
    <div class="c-amt">10,500</div>

</div>

<div class="flex-row list-item">

    <div class="c-date">05/01</div>
    <div class="c-name">米露</div>
    <div class="c-nat">台灣</div>
    <div class="c-plan">-</div>

    <div class="c-add">
        <span class="pills addon-pill">口爆</span>
    </div>

    <div class="c-tip">-</div>

    <div class="c-amt">3,500</div>

</div>

</div>
</div>

<!-- 2025 -->

<div class="year-section">

<div class="year-header">

    <div class="year-title">
        2025 年度紀錄
    </div>

    <div class="arrow">▼</div>

</div>

<div id="content2025" class="content-container">

<div class="flex-row list-item">

    <div class="c-date">12/31</div>
    <div class="c-name">奈香</div>
    <div class="c-nat">泰國</div>
    <div class="c-plan">-</div>
    <div class="c-add">-</div>
    <div class="c-tip">-</div>
    <div class="c-amt">5,600</div>

</div>

</div>
</div>

</div>

<div class="footer">
    W A Z A I - D I A R Y
</div>

</div>

<script>

document.querySelectorAll('.year-header')
.forEach(header => {

    header.addEventListener('click', () => {

        const content =
            header.nextElementSibling;

        const arrow =
            header.querySelector('.arrow');

        const isCollapsed =
            content.classList.contains('collapsed');

        if(isCollapsed){

            content.classList.remove('collapsed');

            content.style.maxHeight =
                content.scrollHeight + 'px';

        }else{

            content.style.maxHeight = '0px';

            content.classList.add('collapsed');
        }

        arrow.classList.toggle('rotate-arrow');
    });
});

window.addEventListener('load', () => {

    document.querySelectorAll('.content-container')
    .forEach(content => {

        content.style.maxHeight =
            content.scrollHeight + 'px';
    });
});

</script>

</body>
</html>
