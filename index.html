<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-color: #f2f0eb; --card-bg: #ffffff; --accent: #7a6f66; 
            --text-dark: #4a4a4a; --text-light: #9e9e9e; --line-color: #e8e6e1;
            --pill-bg: #fdf2f2; --pill-text: #e59a9a;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-dark); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background-color: var(--card-bg); border-radius: 24px; padding: 25px 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); }
        header h1 { text-align: center; font-weight: 300; letter-spacing: 6px; font-size: 1.2rem; color: var(--accent); margin-bottom: 25px; }
        
        .summary-box { background-color: #faf9f7; border-radius: 16px; display: flex; margin-bottom: 25px; border: 1px solid var(--line-color); padding: 15px 0; }
        .summary-item { flex: 1; text-align: center; border-right: 1px solid var(--line-color); }
        .summary-item:last-child { border-right: none; }
        .summary-item span { font-size: 0.65rem; color: var(--text-light); display: block; margin-bottom: 4px; }
        .summary-item b { font-size: 1.1rem; color: var(--accent); }

        .year-header { 
            background: #faf9f7; border-radius: 12px; border: 1px solid var(--line-color); 
            margin-bottom: 10px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
        }
        .year-title { font-size: 0.9rem; font-weight: 600; color: var(--accent); }

        /* 關鍵對齊結構 */
        .row { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #f8f8f8; }
        .col { display: flex; flex-direction: column; align-items: center; flex: 1; }
        
        /* 標籤（如：日期） */
        .label { font-size: 0.6rem; color: var(--text-light); margin-bottom: 4px; font-weight: normal; }
        /* 數據（如：05/03） */
        .data { font-size: 0.8rem; font-weight: 600; color: var(--text-dark); }
        
        /* 針對特定欄位微調 */
        .col-date { flex: 0 0 50px; align-items: flex-start; }
        .col-amt { flex: 0 0 70px; align-items: flex-end; }
        .col-amt .data { color: var(--accent); font-weight: 700; }

        .pill { background: var(--pill-bg); color: var(--pill-text); font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .footer { text-align: center; margin-top: 40px; font-size: 0.6rem; color: var(--text-light); letter-spacing: 4px; opacity: 0.4; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>蛙 仔 開 箱 趣</h1></header>
    
    <div class="summary-box">
        <div class="summary-item"><span>人數</span><b>23</b></div>
        <div class="summary-item"><span>加值</span><b>2</b></div>
        <div class="summary-item"><span>總計</span><b>109,200</b></div>
    </div>

    <div class="year-header"><div class="year-title">2026 年度紀錄</div></div>

    <div class="row">
        <div class="col col-date"><span class="label">日期</span><span class="data">05/03</span></div>
        <div class="col"><span class="label">名字</span><span class="data">孟娜</span></div>
        <div class="col"><span class="label">國籍</span><span class="data">越南</span></div>
        <div class="col"><span class="label">加值</span><span class="data">-</span></div>
        <div class="col col-amt"><span class="label">金額</span><span class="data">10,500</span></div>
    </div>

    <div class="row">
        <div class="col col-date"><span class="label">日期</span><span class="data">05/01</span></div>
        <div class="col"><span class="label">名字</span><span class="data">米露</span></div>
        <div class="col"><span class="label">國籍</span><span class="data">台灣</span></div>
        <div class="col"><span class="label">加值</span><span class="pill">口爆</span></div>
        <div class="col col-amt"><span class="label">金額</span><span class="data">3,500</span></div>
    </div>

    <div class="row">
        <div class="col col-date"><span class="label">日期</span><span class="data">04/18</span></div>
        <div class="col"><span class="label">名字</span><span class="data">孟娜</span></div>
        <div class="col"><span class="label">國籍</span><span class="data">越南</span></div>
        <div class="col"><span class="label">加值</span><span class="data">-</span></div>
        <div class="col col-amt"><span class="label">金額</span><span class="data">7,000</span></div>
    </div>

    <div class="row">
        <div class="col col-date"><span class="label">日期</span><span class="data">04/08</span></div>
        <div class="col"><span class="label">名字</span><span class="data">小光</span></div>
        <div class="col"><span class="label">國籍</span><span class="data">泰國</span></div>
        <div class="col"><span class="label">加值</span><span class="data">-</span></div>
        <div class="col col-amt"><span class="label">金額</span><span class="data">2,500</span></div>
    </div>

    <div class="row">
        <div class="col col-date"><span class="label">日期</span><span class="data">03/22</span></div>
        <div class="col"><span class="label">名字</span><span class="data">薇倩</span></div>
        <div class="col"><span class="label">國籍</span><span class="data">泰國</span></div>
        <div class="col"><span class="label">加值</span><span class="data">-</span></div>
        <div class="col col-amt"><span class="label">金額</span><span class="data">7,500</span></div>
    </div>

    <div class="footer">W A Z A I - D I A R Y</div>
</div>

</body>
</html>
